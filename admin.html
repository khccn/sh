<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غرفة العمليات - بيور ديزاين</title>
    <link rel="icon" href="82433.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #8e735b; --bg: #f8f5f2; --text: #2d3436; --white: #ffffff; --success: #27ae60; --danger: #d63031; --warning: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 1100px; margin: 0 auto; display: none; }
        
        .header { text-align: center; margin-bottom: 30px; position: relative; }
        .admin-logo { width: 120px; margin-bottom: 10px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.1)); }
        .logout-btn { position: absolute; left: 0; top: 10px; background: var(--danger); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .card { background: var(--white); padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid rgba(142, 115, 91, 0.1); }
        h3 { margin-top: 0; border-bottom: 2px solid var(--bg); padding-bottom: 10px; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #eee; }
        th { background: #fafafa; color: var(--primary); font-weight: 600; }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        input, select, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 14px; width: 100%; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 80px; grid-column: 1 / -1; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; font-family: inherit; }
        .btn-add { background: var(--success); color: white; justify-content: center; font-size: 16px; grid-column: 1 / -1; }
        .btn-edit { background: var(--primary); color: white; }
        
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block;}
        .status-new { background: #fff3cd; color: #856404; }
        .status-done { background: #d4edda; color: #155724; }

        .action-btns { display: flex; gap: 10px; align-items: center; }
        .btn-circle { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; font-size: 14px; transition: 0.2s; }

        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); text-align: center; width: 320px; }

        /* تنسيق نافذة التعديل المنبثقة */
        #edit-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(5px); }
        .edit-box { background: white; padding: 30px; border-radius: 15px; width: 400px; max-width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: flex; flex-direction: column; gap: 12px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <img src="82433.png" alt="Pure Design" style="width: 100px; margin-bottom: 20px;">
        <h2 style="color:var(--primary)">🔒 دخول الإدارة</h2>
        <input type="email" id="admin-email" placeholder="البريد الإلكتروني" style="margin-bottom:15px;">
        <input type="password" id="admin-pass" placeholder="كلمة المرور" style="margin-bottom:20px;" onkeypress="handleEnter(event)">
        <button class="btn btn-edit" onclick="checkPass()" style="width:100%; justify-content:center;">دخول</button>
    </div>
</div>

<div id="edit-modal-overlay">
    <div class="edit-box">
        <h3 style="margin-bottom: 10px;"><i class="fas fa-edit"></i> تعديل بيانات المنتج</h3>
        <input type="hidden" id="edit-p-id">
        <input type="text" id="edit-p-name" placeholder="اسم المنتج">
        <input type="number" id="edit-p-price" placeholder="السعر">
        <input type="text" id="edit-p-cat" placeholder="القسم">
        <input type="text" id="edit-p-img" placeholder="اسم الصورة">
        <textarea id="edit-p-desc" placeholder="الوصف" style="min-height: 80px;"></textarea>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button class="btn btn-edit" style="flex: 1; justify-content: center;" onclick="saveProductEdit()"><i class="fas fa-save"></i> حفظ التعديلات</button>
            <button class="btn" style="flex: 1; justify-content: center; background: #ccc; color: #333;" onclick="closeEditModal()"><i class="fas fa-times"></i> إلغاء</button>
        </div>
    </div>
</div>

<div class="container" id="main-content">
    <div class="header">
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
        <img src="82433.png" alt="Logo" class="admin-logo">
        <h1>لوحة التحكم</h1>
        <p>إدارة متجر بيور ديزاين</p>
    </div>

    <div class="card">
        <h3><i class="fas fa-plus-circle"></i> إضافة خدمة/منتج جديد</h3>
        <div class="form-grid">
            <input type="text" id="new-p-name" placeholder="اسم المنتج">
            <input type="number" id="new-p-price" placeholder="السعر">
            <input list="categories-list" id="new-p-cat" placeholder="القسم">
            <datalist id="categories-list">
                <option value="خدمات رقمية">
                <option value="متاجر إلكترونية">
                <option value="دعوات">
                <option value="ألعاب">
                <option value="بشارات">
            </datalist>
            <input type="text" id="new-p-img" placeholder="اسم الصورة (مثلاً: Born.jpg)">
            <textarea id="new-p-desc" placeholder="وصف المنتج التفصيلي"></textarea>
            <button class="btn btn-add" onclick="addNewProduct()"><i class="fas fa-cloud-upload-alt"></i> إدراج في المتجر</button>
        </div>
    </div>

    <div class="card">
        <h3><i class="fas fa-list-ul"></i> إدارة المنتجات</h3>
        <table id="products-table">
            <thead>
                <tr>
                    <th>المنتج</th>
                    <th>القسم</th>
                    <th>السعر</th>
                    <th>العمليات</th>
                </tr>
            </thead>
            <tbody id="products-body"></tbody>
        </table>
    </div>

    <div class="card">
        <h3><i class="fas fa-history"></i> سجل الطلبات الحديثة</h3>
        <div id="orders-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyArRTcygI2dadObLCWPSVxOfC3gkBjyHHo",
        authDomain: "pure-design-de0f7.firebaseapp.com",
        projectId: "pure-design-de0f7",
        storageBucket: "pure-design-de0f7.firebasestorage.app",
        messagingSenderId: "647657577378",
        appId: "1:647657577378:web:6d192aa609c921c16db0fb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    window.allProducts = []; // 🌟 مصفوفة ذكية لحفظ بيانات المنتجات لتسهيل التعديل

    window.handleEnter = function(e) { if (e.key === 'Enter') checkPass(); }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            loadData();
        } else {
            document.getElementById('login-overlay').style.display = 'flex';
            document.getElementById('main-content').style.display = 'none';
        }
    });

    window.checkPass = async function() {
        const email = document.getElementById('admin-email').value;
        const pass = document.getElementById('admin-pass').value;
        try { await signInWithEmailAndPassword(auth, email, pass); } catch (e) { alert("بيانات الدخول غير صحيحة!"); }
    }

    window.logout = function() { signOut(auth).then(() => alert("خرجت بنجاح")); }

    async function loadData() {
        // المنتجات
        const pSnap = await getDocs(collection(db, "products"));
        const pBody = document.getElementById('products-body');
        pBody.innerHTML = "";
        window.allProducts = []; // تصفير المصفوفة

        pSnap.forEach(d => {
            const p = d.data();
            window.allProducts.push({ docId: d.id, ...p }); // حفظ البيانات لاستخدامها وقت التعديل
            
            pBody.innerHTML += `<tr>
                <td><strong>${p.name}</strong></td>
                <td><span class="status-badge" style="background:#eee;">${p.category}</span></td>
                <td style="font-weight:bold; color:var(--primary);">${p.price} ريال</td>
                <td class="action-btns">
                    <button class="btn-circle btn-edit" title="تعديل شامل" onclick="openEditModal('${d.id}')"><i class="fas fa-pen"></i></button>
                    <button class="btn-circle" style="background:var(--danger); color:white" title="حذف" onclick="deleteProduct('${d.id}')"><i class="fas fa-trash"></i></button>
                </td>
            </tr>`;
        });

        // الطلبات
        const oSnap = await getDocs(collection(db, "orders"));
        let ordersArray = [];
        oSnap.forEach(d => ordersArray.push({id: d.id, ...d.data()}));
        ordersArray.sort((a,b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));

        let html = "<table><tr><th>التاريخ</th><th>رقم الطلب</th><th>الإجمالي</th><th>الحالة والتحكم</th></tr>";
        ordersArray.forEach(o => {
            const date = o.createdAt ? o.createdAt.toDate().toLocaleString('ar-SA') : 'جديد';
            const statusClass = o.status === 'مكتمل' ? 'status-done' : 'status-new';
            const orderNum = o.orderNumber || o.id.substring(0,5);
            
            html += `<tr>
                <td>${date}</td>
                <td style="font-weight:bold;">#${orderNum}</td>
                <td style="color:var(--primary); font-weight:bold;">${o.total}</td>
                <td class="action-btns">
                    <span class="status-badge ${statusClass}">${o.status || 'جديد'}</span>
                    <button class="btn-circle" style="background:var(--success); color:white" title="تم التنفيذ" onclick="updateStatus('${o.id}', 'مكتمل')"><i class="fas fa-check"></i></button>
                    <button class="btn-circle" style="background:var(--warning); color:white" title="تراجع (إعادة لجديد)" onclick="updateStatus('${o.id}', 'جديد')"><i class="fas fa-times"></i></button>
                </td>
            </tr>`;
        });
        document.getElementById('orders-list').innerHTML = html + "</table>";
    }

    // 🌟 وظائف التعديل الشامل الجديدة 🌟
    window.openEditModal = function(docId) {
        // البحث عن بيانات المنتج من المصفوفة الذكية
        const p = window.allProducts.find(x => x.docId === docId);
        if(!p) return;
        
        // تعبئة البيانات في النافذة
        document.getElementById('edit-p-id').value = docId;
        document.getElementById('edit-p-name').value = p.name || '';
        document.getElementById('edit-p-price').value = p.price || '';
        document.getElementById('edit-p-cat').value = p.category || '';
        document.getElementById('edit-p-img').value = p.image || '';
        document.getElementById('edit-p-desc').value = p.desc || '';
        
        // إظهار النافذة
        document.getElementById('edit-modal-overlay').style.display = 'flex';
    }

    window.closeEditModal = function() {
        document.getElementById('edit-modal-overlay').style.display = 'none';
    }

    window.saveProductEdit = async function() {
        const id = document.getElementById('edit-p-id').value;
        const btn = event.currentTarget;
        const originalText = btn.innerHTML;
        btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> جاري الحفظ...";

        try {
            await updateDoc(doc(db, "products", id), {
                name: document.getElementById('edit-p-name').value,
                price: Number(document.getElementById('edit-p-price').value),
                category: document.getElementById('edit-p-cat').value,
                image: document.getElementById('edit-p-img').value,
                desc: document.getElementById('edit-p-desc').value
            });
            
            closeEditModal();
            loadData(); // تحديث الجدول فوراً
            alert("تم حفظ التعديلات بنجاح! سينعكس ذلك في المتجر فوراً ✨");
        } catch(e) {
            alert("حدث خطأ أثناء حفظ التعديلات.");
            btn.innerHTML = originalText;
        }
    }

    window.addNewProduct = async function() {
        const name = document.getElementById('new-p-name').value;
        const price = document.getElementById('new-p-price').value;
        const cat = document.getElementById('new-p-cat').value;
        const img = document.getElementById('new-p-img').value;
        const desc = document.getElementById('new-p-desc').value;

        if(!name || !price || !img || !cat) return alert("يرجى تعبئة الخانات الأساسية!");

        try {
            await addDoc(collection(db, "products"), {
                id: Math.floor(10000 + Math.random() * 90000),
                name, price: Number(price), category: cat, image: img, desc: desc || "لا يوجد وصف.", hasOptions: false
            });
            
            // تفريغ الخانات بعد الإضافة
            document.getElementById('new-p-name').value = '';
            document.getElementById('new-p-price').value = '';
            document.getElementById('new-p-cat').value = '';
            document.getElementById('new-p-img').value = '';
            document.getElementById('new-p-desc').value = '';
            
            alert("تمت الإضافة بنجاح!");
            loadData();
        } catch(e) { alert("حدث خطأ!"); }
    }

    window.updateStatus = async function(id, newStatus) {
        await updateDoc(doc(db, "orders", id), { status: newStatus });
        loadData();
    }

    window.deleteProduct = async function(id) {
        if(confirm("هل أنت متأكد من حذف هذا المنتج نهائياً؟")) { 
            await deleteDoc(doc(db, "products", id)); 
            loadData(); 
        }
    }
</script>
</body>
</html>
