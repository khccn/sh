<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز التحكم - بيور ديزاين</title>
    <link rel="icon" href="888888.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #8e735b; --bg: #f8f5f2; --text: #2d3436; --white: #ffffff; --success: #27ae60; --danger: #d63031; --warning: #f39c12; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 1100px; margin: 0 auto; display: none; }
        .header { text-align: center; margin-bottom: 30px; position: relative; }
        .admin-logo { width: 100px; margin-bottom: 10px; }
        .logout-btn { position: absolute; left: 0; top: 10px; background: var(--danger); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .card { background: var(--white); padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        h3 { margin-top: 0; border-bottom: 2px solid var(--bg); padding-bottom: 10px; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        
        /* محرك البحث */
        .search-box { position: relative; margin-bottom: 20px; }
        .search-box input { padding: 12px 45px 12px 12px; border: 1px solid #ddd; border-radius: 10px; width: 100%; box-sizing: border-box; font-size: 16px; }
        .search-box i { position: absolute; right: 15px; top: 15px; color: #999; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #eee; }
        th { background: #fafafa; color: var(--primary); }
        
        .btn-circle { width: 35px; height: 35px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; border: none; cursor: pointer; color: white; transition: 0.2s; margin: 0 2px; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-new { background: #fff3cd; color: #856404; }
        .status-done { background: #d4edda; color: #155724; }

        /* النوافذ المنبثقة */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(5px); }
        .modal-box { background: white; padding: 30px; border-radius: 20px; width: 450px; max-width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .order-item-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #eee; }

        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 4000; }
        .login-box { background: white; padding: 40px; border-radius: 25px; text-align: center; width: 320px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <img src="82433.png" style="width: 80px; margin-bottom: 20px;">
        <h2 style="color:var(--primary)">دخول الإدارة</h2>
        <input type="email" id="admin-email" placeholder="البريد الإلكتروني" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
        <input type="password" id="admin-pass" placeholder="كلمة المرور" style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ddd; border-radius:8px;" onkeypress="if(event.key==='Enter')checkPass()">
        <button onclick="checkPass()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">دخول</button>
    </div>
</div>

<div id="edit-modal-overlay" class="modal-overlay">
    <div class="modal-box">
        <h3><i class="fas fa-edit"></i> تعديل المنتج</h3>
        <input type="hidden" id="edit-p-id">
        <input type="text" id="edit-p-name" placeholder="اسم المنتج" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
        <input type="number" id="edit-p-price" placeholder="السعر" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
        <input type="text" id="edit-p-cat" placeholder="القسم" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
        <input type="text" id="edit-p-img" placeholder="اسم الصورة" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
        <textarea id="edit-p-desc" placeholder="الوصف" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius:8px; height:80px;"></textarea>
        <button onclick="saveProductEdit()" style="width:100%; padding:12px; background:var(--success); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; margin-bottom:10px;">حفظ التعديلات</button>
        <button onclick="closeModal('edit-modal-overlay')" style="width:100%; padding:12px; background:#eee; color:#333; border:none; border-radius:8px; cursor:pointer;">إلغاء</button>
    </div>
</div>

<div id="order-modal-overlay" class="modal-overlay">
    <div class="modal-box">
        <h3 id="modal-order-title" style="color:var(--primary)">تفاصيل الطلب</h3>
        <div id="order-details-content"></div>
        <hr style="border:none; border-top:1px solid #eee; margin:20px 0;">
        <button onclick="closeModal('order-modal-overlay')" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer;">إغلاق</button>
    </div>
</div>

<div class="container" id="main-content">
    <div class="header">
        <button class="logout-btn" onclick="logout()">خروج</button>
        <img src="82433.png" class="admin-logo">
        <h1>لوحة التحكم</h1>
    </div>

    <div class="card">
        <h3><i class="fas fa-plus-circle"></i> إضافة منتج جديد</h3>
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:15px;">
            <input type="text" id="new-p-name" placeholder="اسم المنتج" style="padding:12px; border:1px solid #ddd; border-radius:8px;">
            <input type="number" id="new-p-price" placeholder="السعر" style="padding:12px; border:1px solid #ddd; border-radius:8px;">
            <input list="cats" id="new-p-cat" placeholder="القسم" style="padding:12px; border:1px solid #ddd; border-radius:8px;">
            <datalist id="cats"><option value="خدمات رقمية"><option value="بشارات"><option value="دعوات"></datalist>
            <input type="text" id="new-p-img" placeholder="اسم الصورة" style="padding:12px; border:1px solid #ddd; border-radius:8px;">
            <textarea id="new-p-desc" placeholder="وصف المنتج" style="grid-column: 1/-1; padding:12px; border:1px solid #ddd; border-radius:8px; height:60px;"></textarea>
            <button onclick="addNewProduct()" style="grid-column: 1/-1; padding:12px; background:var(--success); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">إدراج في المتجر</button>
        </div>
    </div>

    <div class="card">
        <h3><i class="fas fa-box"></i> إدارة المنتجات</h3>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="product-search" placeholder="ابحث عن منتج بالاسم أو القسم..." oninput="filterProductsTable()">
        </div>
        <table id="products-table">
            <thead><tr><th>المنتج</th><th>القسم</th><th>السعر</th><th>العمليات</th></tr></thead>
            <tbody id="products-body"></tbody>
        </table>
    </div>

    <div class="card">
        <h3><i class="fas fa-history"></i> سجل الطلبات الحديثة</h3>
        <table id="orders-table">
            <thead><tr><th>التاريخ</th><th>رقم الطلب</th><th>الإجمالي</th><th>العمليات</th></tr></thead>
            <tbody id="orders-body"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyArRTcygI2dadObLCWPSVxOfC3gkBjyHHo",
        authDomain: "pure-design-de0f7.firebaseapp.com",
        projectId: "pure-design-de0f7",
        storageBucket: "pure-design-de0f7.firebasestorage.app",
        messagingSenderId: "647657577378",
        appId: "1:647657577378:web:6d192aa609c921c16db0fb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    window.allProducts = [];
    window.allOrders = [];

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            loadData();
        } else {
            document.getElementById('login-overlay').style.display = 'flex';
        }
    });

    window.checkPass = async () => {
        const e = document.getElementById('admin-email').value;
        const p = document.getElementById('admin-pass').value;
        try { await signInWithEmailAndPassword(auth, e, p); } catch { alert("خطأ في البيانات!"); }
    };

    window.logout = () => signOut(auth);

    async function loadData() {
        const pSnap = await getDocs(collection(db, "products"));
        window.allProducts = [];
        pSnap.forEach(d => window.allProducts.push({docId: d.id, ...d.data()}));
        renderProductsTable(window.allProducts);

        const oSnap = await getDocs(collection(db, "orders"));
        window.allOrders = [];
        oSnap.forEach(d => window.allOrders.push({docId: d.id, ...d.data()}));
        window.allOrders.sort((a,b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
        renderOrdersTable();
    }

    function renderProductsTable(data) {
        const tbody = document.getElementById('products-body');
        tbody.innerHTML = data.map(p => `
            <tr style="opacity: ${p.isHidden ? '0.5' : '1'}">
                <td>${p.name} ${p.isHidden ? '<small>(مخفي)</small>' : ''}</td>
                <td><span class="status-badge" style="background:#eee">${p.category}</span></td>
                <td><b>${p.price} ريال</b></td>
                <td>
                    <button class="btn-circle" style="background:var(--blue)" onclick="openEditModal('${p.docId}')"><i class="fas fa-pen"></i></button>
                    <button class="btn-circle" style="background:${p.isHidden ? '#999' : 'var(--warning)'}" onclick="toggleHide('${p.docId}', ${p.isHidden})"><i class="fas ${p.isHidden ? 'fa-eye-slash' : 'fa-eye'}"></i></button>
                    <button class="btn-circle" style="background:var(--danger)" onclick="deleteProduct('${p.docId}')"><i class="fas fa-trash"></i></button>
                </td>
            </tr>
        `).join('');
    }

    window.filterProductsTable = () => {
        const term = document.getElementById('product-search').value.toLowerCase();
        const filtered = window.allProducts.filter(p => p.name.toLowerCase().includes(term) || p.category.toLowerCase().includes(term));
        renderProductsTable(filtered);
    };

    function renderOrdersTable() {
        const tbody = document.getElementById('orders-body');
        tbody.innerHTML = window.allOrders.map(o => `
            <tr>
                <td><small>${o.createdAt?.toDate().toLocaleString('ar-SA') || 'جديد'}</small></td>
                <td><button style="border:none; background:none; color:var(--blue); cursor:pointer; font-weight:bold" onclick="viewOrderDetails('${o.docId}')">#${o.orderNumber || o.docId.substring(0,5)}</button></td>
                <td style="color:var(--success)"><b>${o.total}</b></td>
                <td>
                    <span class="status-badge ${o.status === 'مكتمل' ? 'status-done' : 'status-new'}">${o.status || 'جديد'}</span>
                    <button class="btn-circle" style="background:var(--success)" onclick="updateStatus('${o.docId}', 'مكتمل')"><i class="fas fa-check"></i></button>
                    <button class="btn-circle" style="background:var(--danger)" onclick="deleteOrder('${o.docId}')"><i class="fas fa-trash"></i></button>
                </td>
            </tr>
        `).join('');
    }

    window.viewOrderDetails = (id) => {
        const o = window.allOrders.find(x => x.docId === id);
        document.getElementById('modal-order-title').innerText = "تفاصيل طلب #" + (o.orderNumber || id.substring(0,5));
        let html = "";
        o.items.forEach(item => {
            html += `<div class="order-item-row"><span>${item.name} (x${item.quantity})</span><b>${item.price * item.quantity} ريال</b></div>`;
        });
        html += `<div style="margin-top:15px; text-align:left; font-size:1.2em; color:var(--primary)"><b>الإجمالي: ${o.total}</b></div>`;
        document.getElementById('order-details-content').innerHTML = html;
        document.getElementById('order-modal-overlay').style.display = 'flex';
    };

    window.closeModal = (id) => document.getElementById(id).style.display = 'none';

    window.addNewProduct = async () => {
        const data = {
            id: Math.floor(10000 + Math.random() * 90000),
            name: document.getElementById('new-p-name').value,
            price: Number(document.getElementById('new-p-price').value),
            category: document.getElementById('new-p-cat').value,
            image: document.getElementById('new-p-img').value,
            desc: document.getElementById('new-p-desc').value,
            isHidden: false, hasOptions: false
        };
        await addDoc(collection(db, "products"), data);
        alert("تمت الإضافة!"); loadData();
    };

    window.toggleHide = async (id, current) => { await updateDoc(doc(db, "products", id), {isHidden: !current}); loadData(); };
    window.updateStatus = async (id, s) => { await updateDoc(doc(db, "orders", id), {status: s}); loadData(); };
    window.deleteOrder = async (id) => { if(confirm("حذف الطلب نهائياً؟")) { await deleteDoc(doc(db, "orders", id)); loadData(); } };
    window.deleteProduct = async (id) => { if(confirm("حذف المنتج نهائياً؟")) { await deleteDoc(doc(db, "products", id)); loadData(); } };

    window.openEditModal = (id) => {
        const p = window.allProducts.find(x => x.docId === id);
        document.getElementById('edit-p-id').value = id;
        document.getElementById('edit-p-name').value = p.name;
        document.getElementById('edit-p-price').value = p.price;
        document.getElementById('edit-p-cat').value = p.category;
        document.getElementById('edit-p-img').value = p.image;
        document.getElementById('edit-p-desc').value = p.desc;
        document.getElementById('edit-modal-overlay').style.display = 'flex';
    };

    window.saveProductEdit = async () => {
        const id = document.getElementById('edit-p-id').value;
        await updateDoc(doc(db, "products", id), {
            name: document.getElementById('edit-p-name').value,
            price: Number(document.getElementById('edit-p-price').value),
            category: document.getElementById('edit-p-cat').value,
            image: document.getElementById('edit-p-img').value,
            desc: document.getElementById('edit-p-desc').value
        });
        closeModal('edit-modal-overlay'); loadData();
    };
</script>
</body>
</html>
